name: 🚀 Deploy Astro Blog

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ① 拉取代码 - 更新到最新版本
      - name: 📦 Checkout
        uses: actions/checkout@v4

      # ② 安装 Node.js 环境 - 使用最新的 Node.js LTS 版本
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # 改为 22（最新 LTS）
          cache: 'npm'

      # ③ 安装项目依赖
      - name: 📥 Install Dependencies
        run: npm install

      # ④ 构建 Astro 项目
      - name: 🔨 Build Astro
        run: npm run build

      # ⑤ 上传构建产物到服务器
      - name: 📤 Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/blog"
          strip_components: 1
          #rm: true

      # ⑥ 完成通知（可选）
      - name: ✅ Deploy Success
        run: echo "博客部署成功！"